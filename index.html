<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>World Chess Trainer</title>
</head>
<body>
<div id="app">

  <header>
    <h1>♔ World Chess Trainer</h1>
    <div class="top-controls">
      <select id="difficulty">
        <option value="basic">Básico</option>
        <option value="medium">Médio</option>
        <option value="advanced">Avançado</option>
        <option value="world" selected>Campeonato Mundial</option>
      </select>
      <button id="hintsToggle" class="hints-toggle">💡 Dicas</button>
      <button id="newGame">Nova Partida</button>
    </div>
  </header>

  <main>

    <section class="board-area">

      <div class="clock black" id="clockBlack">
        <div class="player">♟ Stockfish (IA) <span id="thinkingDot" class="thinking-dot"></span></div>
        <div id="blackTime">10:00</div>
      </div>

      <div class="board-wrapper">
        <div id="board"></div>

        <!-- Game over overlay -->
        <div id="gameOverOverlay" class="game-over-overlay hidden">
          <p id="gameOverMessage"></p>
          <div class="overlay-buttons">
            <button id="analyzeBtn">Ver Análise</button>
            <button id="newGameOverlay">Nova Partida</button>
          </div>
        </div>
      </div>

      <div class="clock white">
        <div class="player">♙ Você</div>
        <div id="whiteTime">10:00</div>
      </div>

      <div id="hint-panel" class="hint-panel hidden">
        <span id="hint-icon" class="hint-icon"></span>
        <div class="hint-text">
          <strong id="hint-label"></strong>
          <span id="hint-detail"></span>
        </div>
      </div>

    </section>

    <aside>
      <div id="opening-panel" class="opening-panel">
        <div class="opening-label">Abertura</div>
        <div class="opening-header">
          <span id="opening-name" class="opening-name">—</span>
          <span id="opening-eco" class="opening-eco"></span>
        </div>
        <p id="opening-tip" class="opening-tip"></p>
      </div>
      <h2>Histórico</h2>
      <div id="moves"></div>
      <div id="move-detail"></div>
    </aside>

  </main>

</div>

<!-- Analysis modal -->
<div id="analysisModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>📊 Análise da Partida</h2>
      <button id="closeAnalysis" class="close-btn">✕</button>
    </div>
    <p id="analysisProgress" class="analysis-progress hidden"></p>
    <div id="analysisContent" class="modal-body"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
